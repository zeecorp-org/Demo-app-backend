databases:
  - name: demo-app-db
    databaseName: demoapp
    user: demoapp_user

services:
  - type: web
    name: demo-app-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DOCS_ENABLED
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: demo-app-db
          property: connectionString
      - key: OSRM_BASE_URL
        value: http://routing-osrm:5000
      - key: MIGRATION_MAX_ATTEMPTS
        value: 60
      - key: MIGRATION_RETRY_DELAY_SECONDS
        value: 2

  - type: pserv
    name: routing-osrm
    runtime: docker
    dockerfilePath: ./Dockerfile.osrm
    disk:
      name: routing-osrm-data
      mountPath: /data
      sizeGB: 20
    envVars:
      - key: OSRM_EXTRACT_URL
        value: https://download.geofabrik.de/asia/india/karnataka-latest.osm.pbf
      - key: OSRM_EXTRACT_FILE
        value: region.osm.pbf
      - key: OSRM_GRAPH_BASENAME
        value: region
      - key: OSRM_LUA_PROFILE
        value: car
      - key: OSRM_THREADS
        value: 2
